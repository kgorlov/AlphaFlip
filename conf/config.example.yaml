project:
  name: leadlag-bot
  language: python
  runtime: "3.12"
  mode: hybrid

runtime:
  mode: shadow
  live_requires_runtime_confirmation: true

market_profiles:
  - name: spot_to_spot
    leader:
      venue: binance
      market: spot
    lagger:
      venue: mexc
      market: spot
      execution: metascalp
  - name: perp_to_perp
    leader:
      venue: binance
      market: usdt_perp
    lagger:
      venue: mexc
      market: usdt_perp
      execution: metascalp

universe:
  active_profile: perp_to_perp
  refresh_sec: 30
  top_n_live: 40
  min_quote_volume_usd_24h: 2000000
  max_spread_bps: 12
  min_top5_depth_usd: 25000
  max_tick_bps: 4

signal:
  model: residual_zscore_plus_impulse
  z_entry: 2.2
  z_exit: 0.4
  impulse_windows_ms: [50, 100, 200, 500]
  lag_candidates_ms: [25, 50, 100, 200, 500, 1000]
  safety_bps: 2.0

execution:
  venue: metascalp
  style: auto
  taker_min_edge_bps: 8
  maker_min_edge_bps: 14
  ttl_ms: 3000
  reduce_only_on_exit: true
  metascalp:
    host: 127.0.0.1
    port_min: 17845
    port_max: 17855
    require_demo_mode: true

paper:
  fill_models: [touch, trade_through, queue_aware]
  compare_with_metascalp_demo: true

risk:
  max_open_positions: 5
  max_active_symbols: 5
  max_notional_per_symbol_usd: 500
  max_total_notional_usd: 1500
  max_daily_loss_usd: 150
  stale_feed_ms: 1500
  desync_book_resets_before_block: 3
  max_repeated_order_errors: 3
  max_slippage_bps: 10

storage:
  duckdb_path: data/leadlag.duckdb
  parquet_root: data/parquet
